name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.9"
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          # The full CI run includes optional public I/O surfaces
          # (`audio` for AmbiX WAV, `hrtf` for SOFA) plus plotting for
          # repository reproduction scripts.  End users only need the
          # extras that match their workflow.
          python -m pip install -e ".[dev,plotting,audio,hrtf]"

      - name: Run tests
        run: python -m pytest -q --tb=short

      - name: Verify examples run
        # ``scripts/run_rafaely_ch5_beamforming_example.py`` does
        # ``from scripts.run_rafaely_missing_fig import run_named``,
        # which requires the repo root to be on ``sys.path`` so that
        # ``scripts/`` is importable as a package.  ``python <file>``
        # adds the script's own directory but not the repo root, so
        # set ``PYTHONPATH`` explicitly here.
        env:
          MPLBACKEND: Agg
          PYTHONPATH: .
        run: |
          python scripts/run_rafaely_ch1_spherical_grid.py
          python scripts/run_rafaely_ch5_beamforming_example.py

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel and source distribution
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev,plotting,audio,hrtf]"
          python -m build

      - name: Verify source distribution test subset
        run: |
          tmpdir="$(mktemp -d)"
          tar -xzf dist/spherical_array_processing-*.tar.gz -C "$tmpdir"
          cd "$tmpdir"/spherical_array_processing-*
          python -m pip install ".[dev,plotting,audio,hrtf]"
          python -m pytest -q --tb=short
